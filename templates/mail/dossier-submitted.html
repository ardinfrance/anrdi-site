<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dossier reçu</title>
</head>
<body style="margin:0;padding:0;background:#eff6ff;font-family:Arial,sans-serif;color:#1f2937;">
  <div style="max-width:640px;margin:0 auto;padding:32px 16px;">
    <div style="background:#0f172a;color:#fff;border-radius:20px 20px 0 0;padding:36px 40px;">
      <div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#93c5fd;font-weight:700;">ANRDI · Dossiers</div>
      <h1 style="margin:12px 0 0;font-size:30px;line-height:1.1;">Votre dossier a bien été reçu.</h1>
    </div>
    <div style="background:#ffffff;padding:40px;border-radius:0 0 20px 20px;border:1px solid #dbe5f1;border-top:none;">
      <p style="margin:0 0 18px;">Bonjour <strong>{{first_name}}</strong>,</p>
      <p style="margin:0 0 18px;line-height:1.7;">Votre dossier <strong>{{reference}}</strong> a été créé avec succès.</p>
      <p style="margin:0 0 18px;line-height:1.7;">Objet déclaré : <strong>{{title}}</strong>.</p>
      <p style="margin:0 0 24px;line-height:1.7;">Vous pouvez suivre son avancement depuis votre espace membre.</p>
      <p style="margin:0 0 28px;text-align:center;">
        <a href="{{dashboard_url}}" style="display:inline-block;background:#1d4ed8;color:#fff;text-decoration:none;padding:14px 26px;border-radius:10px;font-weight:700;">Voir mes dossiers</a>
      </p>
      <p style="margin:28px 0 0;font-size:12px;color:#94a3b8;text-align:center;">© {{current_year}} ANRDI · <a href="{{app_url}}" style="color:#1d4ed8;text-decoration:none;">anrdi.fr</a></p>
    </div>
  </div>
</body>
</html>
