<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Nouveau dossier membre</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;line-height:1.6}.wrap{max-width:640px;margin:0 auto;padding:32px 16px}.card{background:#fff;border:1px solid #E2E8F0;border-radius:16px;overflow:hidden}.head{background:linear-gradient(135deg,#0F172A,#1D4ED8);padding:28px 32px}.head h1{font-size:22px;font-weight:800;color:#fff}.body{padding:32px}.txt{font-size:15px;color:#475569;margin-bottom:18px}.meta{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:12px;padding:18px;margin-bottom:20px}.row{padding:8px 0;border-bottom:1px solid #E2E8F0}.row:last-child{border-bottom:none}.label{display:block;font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.08em}.value{display:block;font-size:14px;color:#0F172A;font-weight:600;margin-top:4px}.btn{display:inline-block;margin-top:22px;background:#2563EB;color:#fff!important;text-decoration:none;padding:12px 22px;border-radius:10px;font-weight:700}.foot{padding:20px 32px;background:#F8FAFC;font-size:12px;color:#64748B}</style>
</head><body><div class="wrap"><div class="card"><div class="head"><h1>Nouveau dossier membre</h1></div><div class="body"><p class="txt">Un nouveau dossier vient d’être déposé depuis l’espace membre.</p><div class="meta"><div class="row"><span class="label">Référence</span><span class="value">{{reference}}</span></div><div class="row"><span class="label">Titre</span><span class="value">{{title}}</span></div><div class="row"><span class="label">Catégorie</span><span class="value">{{category}}</span></div><div class="row"><span class="label">Membre</span><span class="value">{{first_name}} - {{email}}</span></div></div><a href="{{dashboard_url}}" class="btn">Ouvrir l’administration</a></div><div class="foot">ANRDI - {{current_year}}</div></div></div></body></html>
