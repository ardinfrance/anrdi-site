<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande RGPD reçue</title>
</head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,sans-serif;color:#1f2937;">
  <div style="max-width:640px;margin:0 auto;padding:32px 16px;">
    <div style="background:#0f172a;color:#fff;border-radius:20px 20px 0 0;padding:36px 40px;">
      <div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#93c5fd;font-weight:700;">ANRDI · RGPD</div>
      <h1 style="margin:12px 0 0;font-size:30px;line-height:1.1;">Votre demande a bien été reçue.</h1>
    </div>
    <div style="background:#ffffff;padding:40px;border-radius:0 0 20px 20px;border:1px solid #dbe5f1;border-top:none;">
      <p style="margin:0 0 18px;">Bonjour <strong>{{name}}</strong>,</p>
      <p style="margin:0 0 18px;line-height:1.7;">Nous confirmons la bonne réception de votre demande RGPD de type <strong>{{request_type}}</strong>.</p>
      <p style="margin:0 0 24px;line-height:1.7;">Notre équipe l’examinera dans les meilleurs délais conformément à la réglementation applicable.</p>
      <p style="margin:28px 0 0;font-size:12px;color:#94a3b8;text-align:center;">© {{current_year}} ANRDI · <a href="{{app_url}}" style="color:#1d4ed8;text-decoration:none;">anrdi.fr</a></p>
    </div>
  </div>
</body>
</html>
